<script>
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Authenticating...`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success!`;
                btn.classList.replace('bg-primary', 'bg-primary-container');
            }, 1500);
        });

        const togglePass = document.querySelector('button[type="button"] span[data-icon="visibility"]');
        const passInput = document.getElementById('password');
        togglePass.parentElement.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            togglePass.innerText = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
